name: Code of Conduct check

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-record-coc:
    if: github.repository == 'program-at/ProgramAT-opensource'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout signatures branch
        uses: actions/checkout@v4
        with:
          ref: coc-signatures
          fetch-depth: 0

      - name: Ensure signatures file exists
        run: |
          mkdir -p .github

          if [ ! -f ".github/code-of-conduct-signatures.yml" ]; then
            echo "signed: []" > .github/code-of-conduct-signatures.yml
          fi

      - name: Check existing signature
        id: existing
        run: |
          USER="${{ github.event.pull_request.user.login }}"
          FILE=".github/code-of-conduct-signatures.yml"

          if yq '.signed[]' "$FILE" | grep -Fxq "$USER"; then
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check PR checkbox
        id: checkbox
        if: steps.existing.outputs.signed != 'true'
        run: |
          BODY=$(jq -r .pull_request.body "$GITHUB_EVENT_PATH")

          if echo "$BODY" | grep -qi -- "- \[x\] I have read and agree to follow the project's Code of Conduct"; then
            echo "checked=true" >> "$GITHUB_OUTPUT"
          else
            echo "checked=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Record signature
        if: steps.existing.outputs.signed != 'true' && steps.checkbox.outputs.checked == 'true'
        run: |
          USER="${{ github.event.pull_request.user.login }}"
          FILE=".github/code-of-conduct-signatures.yml"

          yq -i '.signed += ["'"$USER"'"] | .signed |= unique | .signed |= sort' "$FILE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$FILE"

          if git diff --cached --quiet; then
            echo "No signature changes"
            exit 0
          fi

          git commit -m "Record Code of Conduct signature for $USER"

          git push origin HEAD:coc-signatures

      - name: Fail if not signed
        if: steps.existing.outputs.signed != 'true' && steps.checkbox.outputs.checked != 'true'
        run: |
          echo "::error::Please check the Code of Conduct box in the PR description."
          exit 1

      - name: Comment instructions
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body \
          "Thanks for contributing! Before this PR can be reviewed, please read our Code of Conduct:

          ${{ github.server_url }}/${{ github.repository }}/blob/${{ github.event.repository.default_branch }}/CODE_OF_CONDUCT.md

          Then edit your PR description and check this box:

          - [x] I have read and agree to follow the project's Code of Conduct

          Once recorded, you won’t need to do this again."
