name: Auto-assign to Copilot

on:
  issues:
    types: [opened]

jobs:
  assign-to-copilot:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Append text to issue body
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const extraLine = "\n\nWrite the code for this tool inside the tools folder";

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: issue.body + extraLine
            });
            
      - name: Assign issue creator
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              assignees: [issue.user.login]
            });

      - name: Assign issue to Copilot
        uses: otto-de/assign_issue_toCopilot_action@v1.0.1
        with:
          issue_number: ${{ github.event.issue.number }}
          github_token: ${{ secrets.COPILOT_PAT }}









